name: Auto Release on Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'composer.json'
      - 'composer.lock'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib untuk membuat release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Check if Version Bumped
        id: check_version
        run: |
          # Mengambil versi package.json saat ini
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # Mengambil versi package.json dari commit sebelum push ini
          PREVIOUS_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf-8')).version" 2>/dev/null || echo "0.0.0")
          
          echo "Versi Sebelumnya: $PREVIOUS_VERSION"
          echo "Versi Sekarang: $CURRENT_VERSION"
          
          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "⚠️ Versi package.json tidak berubah. Menghentikan workflow rilis."
            exit 0 # Menghentikan workflow secara damai (sukses) tanpa error
          fi
          
          # Menyimpan versi ke env jika terdeteksi ada kenaikan versi
          echo "VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Sesuaikan dengan versi Node.js Anda
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Dependencies
        run: npm ci

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Get Version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Jalankan Build untuk membuat zip file
      - name: Run Build Script
        run: npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            Automated release for version v${{ env.VERSION }}
          files: |
            dist/vd-store-${{ env.VERSION }}.zip
          draft: false
          prerelease: false
